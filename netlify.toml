# Configuration Netlify – Frontend React + backend Supabase Edge Functions

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  # Obligatoire au build (à définir aussi dans le dashboard Netlify) :
  # REACT_APP_API_URL = https://llmyrnodvjgwdpdiyagi.supabase.co/functions/v1
  # REACT_APP_SUPABASE_URL = https://llmyrnodvjgwdpdiyagi.supabase.co
  # REACT_APP_SUPABASE_ANON_KEY = <clé anon Settings > API>

# SPA React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
